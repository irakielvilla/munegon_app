name: "Publish Release"

on:
  push:
    tags:
      - 'v*' # Se activa al hacer push de una etiqueta como v1.0.0 o v0.1.1

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm ci

      - name: build Tauri app and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Muñegon POS v${{ github.ref_name }}"
          releaseBody: "Actualización automática de Muñegon POS. Consulta los cambios en esta versión."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
